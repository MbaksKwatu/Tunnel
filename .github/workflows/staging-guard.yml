# Parity Staging Guard — determinism + ontology contract checks
#
# Runs on every PR targeting staging. No live Supabase required.
# These checks must pass before any merge to staging is allowed.
#
# Required secrets: none (all guards are static analysis + unit tests)

name: Staging Guard

on:
  pull_request:
    branches: [staging]
  workflow_dispatch:

jobs:
  contract-guards:
    name: Contract Guards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Determinism mode ────────────────────────────────────────────────
      - name: DETERMINISTIC_MODE must remain True
        run: |
          if grep -q "DETERMINISTIC_MODE = False" backend/v1/config.py; then
            echo "::error::DETERMINISTIC_MODE must remain True in backend/v1/config.py"
            exit 1
          fi

      # ── Ontology / classifier vocabulary frozen ──────────────────────────
      - name: Classifier vocabulary lock (requires SCHEMA_VERSION bump to change)
        run: |
          if git diff origin/staging...HEAD -- backend/v1/core/classifier.py 2>/dev/null | grep -q .; then
            if ! git diff origin/staging...HEAD -- backend/v1/config.py 2>/dev/null | grep -q "SCHEMA_VERSION"; then
              echo "::error::classifier.py changed without SCHEMA_VERSION bump in config.py."
              echo "The ontology/role vocabulary is frozen. If this change is intentional:"
              echo "  1. Bump SCHEMA_VERSION in backend/v1/config.py"
              echo "  2. Update docs/openapi/v1.openapi.json"
              echo "  3. Get explicit review approval from the platform owner."
              exit 1
            fi
          fi

      # ── Snapshot engine + pipeline ───────────────────────────────────────
      - name: Snapshot engine lock
        run: |
          if git diff origin/staging...HEAD -- backend/v1/core/snapshot_engine.py 2>/dev/null | grep -q .; then
            if ! git diff origin/staging...HEAD -- backend/v1/config.py 2>/dev/null | grep -q "SCHEMA_VERSION"; then
              echo "::error::snapshot_engine.py changed without SCHEMA_VERSION bump."
              exit 1
            fi
          fi

      - name: Pipeline lock
        run: |
          if git diff origin/staging...HEAD -- backend/v1/core/pipeline.py 2>/dev/null | grep -q .; then
            if ! git diff origin/staging...HEAD -- backend/v1/config.py 2>/dev/null | grep -q "SCHEMA_VERSION"; then
              echo "::error::pipeline.py changed without SCHEMA_VERSION bump."
              exit 1
            fi
          fi

      # ── Schema drift ─────────────────────────────────────────────────────
      - name: pds_* schema lock
        run: |
          if git diff origin/staging...HEAD -- supabase/migrations 2>/dev/null | grep -q "pds_"; then
            echo "::error::pds_* schema change detected. Schema is locked during pilot."
            echo "Bump SCHEMA_VERSION, update docs, and get explicit platform-owner approval."
            exit 1
          fi

      # ── OpenAPI contract ─────────────────────────────────────────────────
      - name: OpenAPI contract lock
        run: |
          if git diff origin/staging...HEAD -- docs/openapi/v1.openapi.json 2>/dev/null | grep -q .; then
            if ! git diff origin/staging...HEAD -- backend/v1/config.py 2>/dev/null | grep -q "SCHEMA_VERSION"; then
              echo "::error::OpenAPI contract changed without SCHEMA_VERSION bump."
              exit 1
            fi
          fi

      # ── Legacy route guard ───────────────────────────────────────────────
      - name: All routes must be under /v1
        run: |
          LEGACY=$(grep -Rn "@app\.\(get\|post\|put\|delete\|patch\)" backend --include="*.py" 2>/dev/null \
            | grep -v '("/")' | grep -v '("/health")' | grep -v '("/v1' \
            | grep -v '("/docs' | grep -v '("/openapi' | grep -v '("/redoc' || true)
          if [ -n "$LEGACY" ]; then
            echo "::error::Legacy API route detected. All routes must be under /v1."
            echo "$LEGACY"
            exit 1
          fi

  determinism-tests:
    name: Determinism & Ontology Tests
    runs-on: ubuntu-latest
    needs: contract-guards

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Run only the determinism/ontology test files — no Supabase needed.
      # These tests are fast, pure-Python, and cover the invariants that
      # must never regress on staging.
      - name: Determinism stress tests
        run: |
          python -m pytest backend/tests_v1/test_determinism_stress.py -v --tb=short

      - name: Golden hash sentinel
        run: |
          python -m pytest backend/tests_v1/test_golden_hash_sentinel.py -v --tb=short

      - name: Classifier / ontology keyword tests
        run: |
          python -m pytest backend/tests_v1/test_classifier_keywords.py -v --tb=short

      - name: No-float regression
        run: |
          python -m pytest backend/tests_v1/test_no_float_regression.py -v --tb=short

      - name: Basis point semantics
        run: |
          python -m pytest backend/tests_v1/test_basis_point_semantics.py -v --tb=short
