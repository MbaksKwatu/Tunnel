# Parity → parity-staging daily data sync
#
# Copies all pds_* table data from the live Parity DB to parity-staging
# every day at 02:00 UTC. The engineer always has a fresh copy of real data.
#
# Required GitHub secrets (Settings > Secrets and variables > Actions):
#   Use the SESSION POOLER URLs from Supabase (not the direct DB URLs).
#   Find them: Supabase dashboard → Connect → Session pooler tab
#
#   LIVE_DB_URL     — postgres://postgres.[ref]:[password]@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
#   STAGING_DB_URL  — postgres://postgres.[ref]:[password]@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
#
#   The direct db.*.supabase.co URLs use IPv6 which GitHub Actions cannot reach.
#
# One-time setup: before the first sync, apply the schema to parity-staging:
#   psql $STAGING_DB_URL -f supabase/parity_staging_schema.sql
#
# RLS note: synced rows keep their original created_by UUIDs from live.
# The backend uses the service_role key which bypasses RLS, so the engineer
# can read all data via the API. For Supabase Studio access connect via the
# Supabase dashboard which bypasses RLS.

name: Sync parity-staging DB

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # run on-demand from GitHub Actions UI

jobs:
  sync:
    name: Dump live → restore staging
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Validate secrets present
        run: |
          if [ -z "$LIVE_DB_URL" ]; then
            echo "::error::LIVE_DB_URL secret is missing."
            exit 1
          fi
          if [ -z "$STAGING_DB_URL" ]; then
            echo "::error::STAGING_DB_URL secret is missing."
            exit 1
          fi
        env:
          LIVE_DB_URL: ${{ secrets.LIVE_DB_URL }}
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}

      # pg_dump --data-only dumps tables in FK-safe order (parents before children).
      # No --disable-triggers needed — we truncate first so there's no existing data
      # to violate constraints during restore.
      - name: Dump pds_* data from live
        env:
          PGSSLMODE: require
          PATH: /usr/lib/postgresql/17/bin:/usr/bin:/bin
        run: |
          pg_dump \
            "${{ secrets.LIVE_DB_URL }}" \
            --data-only \
            --table=pds_deals \
            --table=pds_documents \
            --table=pds_raw_transactions \
            --table=pds_transfer_links \
            --table=pds_entities \
            --table=pds_txn_entity_map \
            --table=pds_overrides \
            --table=pds_analysis_runs \
            --table=pds_snapshots \
            --table=pds_snapshot_enrichments \
            --table=pds_classification_overrides \
            --table=pds_custom_flags \
            -f /tmp/pds_data.sql

          LINES=$(wc -l < /tmp/pds_data.sql)
          echo "Dump complete: ${LINES} lines"

      # TRUNCATE all pds_* tables at once — CASCADE handles FK ordering automatically.
      # Using ON_ERROR_STOP so any missing table surfaces immediately.
      - name: Truncate staging pds_* tables
        env:
          PGSSLMODE: require
        run: |
          /usr/lib/postgresql/17/bin/psql "${{ secrets.STAGING_DB_URL }}" \
            -v ON_ERROR_STOP=1 \
            -c "TRUNCATE pds_custom_flags, pds_classification_overrides, pds_snapshot_enrichments, pds_snapshots, pds_analysis_runs, pds_overrides, pds_txn_entity_map, pds_entities, pds_transfer_links, pds_raw_transactions, pds_documents, pds_deals CASCADE;"

      # Restore — tables are empty so FK constraints are satisfied in dump order.
      - name: Restore pds_* data to staging
        env:
          PGSSLMODE: require
        run: |
          /usr/lib/postgresql/17/bin/psql "${{ secrets.STAGING_DB_URL }}" \
            --single-transaction \
            -v ON_ERROR_STOP=1 \
            -f /tmp/pds_data.sql

      - name: Verify row counts on staging
        env:
          PGSSLMODE: require
        run: |
          /usr/lib/postgresql/17/bin/psql "${{ secrets.STAGING_DB_URL }}" <<'SQL'
            SELECT tbl, cnt FROM (
              SELECT 'pds_deals'              AS tbl, COUNT(*) AS cnt FROM pds_deals
              UNION ALL SELECT 'pds_documents',        COUNT(*) FROM pds_documents
              UNION ALL SELECT 'pds_raw_transactions', COUNT(*) FROM pds_raw_transactions
              UNION ALL SELECT 'pds_entities',         COUNT(*) FROM pds_entities
              UNION ALL SELECT 'pds_txn_entity_map',   COUNT(*) FROM pds_txn_entity_map
              UNION ALL SELECT 'pds_analysis_runs',    COUNT(*) FROM pds_analysis_runs
              UNION ALL SELECT 'pds_snapshots',        COUNT(*) FROM pds_snapshots
            ) t ORDER BY tbl;
          SQL

      - name: Sync complete
        run: echo "parity-staging refreshed at $(date -u)"
