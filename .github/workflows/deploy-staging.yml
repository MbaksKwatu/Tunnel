name: Deploy to staging
on:
  push:
    branches:
      - paritystaging
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # The deploy-hook curl this replaced created a deployment correctly
      # classified target=production (productionBranch is "paritystaging"),
      # but a deploy hook isn't a git-push webhook — it never actually
      # promoted that build to parity-sme-staging.vercel.app. Builds piled
      # up as individual "production-target" deployments while the real
      # alias sat on a build from 2026-06-20 (PR #7) for over a week.
      # `vercel deploy --prod` does the build AND the promotion in one
      # deterministic step, same as the manual command that fixed this
      # once already — now it runs on every push instead of by hand.
      # Pinned, not @latest: 54.14.5 added multi-service monorepo
      # auto-detection that saw this repo's Next.js root + backend/
      # FastAPI app and tried to derive a composite service name
      # containing "---", which Vercel rejects outright (400,
      # "cannot contain the sequence '---'"). 52.0.0 is what was
      # actually tested manually against this exact project/repo
      # before this workflow was written — use what was verified.
      - name: Install Vercel CLI
        run: npm install -g vercel@52.0.0
      - name: Deploy to Vercel production (staging project)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
